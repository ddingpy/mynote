title: My Blog
description: Technical articles, tutorials, and practical life tips.
url: ""
baseurl: ""
timezone: Asia/Seoul

markdown: kramdown
highlighter: rouge
permalink: /posts/:title/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - Dockerfile
  - docker-compose.yaml
  - README.md
  - .idea/
